<body>

<div class="container">

  <h1 class="title">わたしのKIN診断</h1>

  <p class="subtitle">
    生年月日から、<br>
    あなたのKINナンバーを診断します。
  </p>

  <div class="card">

    <input type="date" id="birthdate">

    <button onclick="calculateKIN()">
      診断する
    </button>

  </div>

  <div class="result" id="result">

    <div class="result-box">

      <div class="label">KINナンバー</div>
      <div class="value" id="kin"></div>

      <div class="label">太陽の紋章</div>
      <div class="value" id="seal"></div>

      <div class="label">ウェイブスペル</div>
      <div class="value" id="wave"></div>

      <div class="label">音</div>
      <div class="value" id="tone"></div>

      <div class="message">
        あなたは、あなたらしく輝いていい。<br>
        宇宙はいつも、あなたを応援しています。
      </div>

    </div>

  </div>

  <div class="footer">

  </div>

</div>

<script>

const seals = [
  "赤い龍","白い風","青い夜","黄色い種","赤い蛇",
  "白い世界の橋渡し","青い手","黄色い星","赤い月","白い犬",
  "青い猿","黄色い人","赤い空歩く人","白い魔法使い","青い鷲",
  "黄色い戦士","赤い地球","白い鏡","青い嵐","黄色い太陽"
];

function calculateKIN() {

  const birthdate = document.getElementById("birthdate").value;

  if (!birthdate) {
    alert("生年月日を入力してください");
    return;
  }

  const baseDate = new Date("1984-02-02");
  const targetDate = new Date(birthdate);

  const diffTime = targetDate - baseDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  let kin = ((diffDays + 63) % 260 + 260) % 260 + 1;

  const tone = ((kin - 1) % 13) + 1;

  const seal = seals[(kin - 1) % 20];

  const wave = seals[Math.floor((kin - 1) / 13) % 20];

  document.getElementById("kin").innerText = "KIN " + kin;
  document.getElementById("seal").innerText = seal;
  document.getElementById("wave").innerText = wave;
  document.getElementById("tone").innerText = "音 " + tone;

  document.getElementById("result").style.display = "block";
}

</script>

</body>
